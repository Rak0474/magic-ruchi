<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic രുചി | Authentic Kerala Kitchen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --kerala-green: #012b21; }
        body { font-family: 'Manjari', sans-serif; color: white; background-color: var(--kerala-green); overflow-x: hidden; scroll-behavior: smooth; }
        
        .bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(rgba(1, 43, 33, 0.7), rgba(0, 0, 0, 0.85)),
                url('https://images.unsplash.com/photo-1596040033229-a9821ebd058d?q=80&w=2070&auto=format&fit=crop') center/cover no-repeat;
            z-index: -1;
            filter: brightness(0.9) contrast(1.1);
        }

        .gold-text { color: var(--gold); font-family: 'Playfair Display', serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(212, 175, 55, 0.15); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6); }
        
        .admin-section { display: none; }
        .admin-active .admin-section { display: block; animation: fadeInRight 0.5s ease forwards; }
        .admin-active .admin-controls { display: flex !important; }

        @keyframes fadeInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        
        #recipeDetail { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,15,12,0.98); overflow-y: auto; }
        
        /* 🖨️ PDF PRINT FIX */
        @media print {
            body { background: white !important; color: black !important; overflow: visible !important; height: auto !important; }
            .no-print, .bg-image, #detImg, nav, .admin-controls, .admin-section { display: none !important; }
            #recipeDetail { position: relative !important; display: block !important; background: white !important; color: black !important; height: auto !important; overflow: visible !important; }
            #recipeDetail .glass { background: transparent !important; border: none !important; box-shadow: none !important; backdrop-filter: none !important; padding: 0 !important; }
            .gold-text { color: black !important; }
            #detMethod { color: black !important; font-size: 14pt !important; line-height: 1.6 !important; white-space: pre-wrap !important; }
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div class="bg-image no-print"></div>
    
    <nav class="flex justify-between items-center px-8 md:px-16 py-4 sticky top-0 z-50 backdrop-blur-xl border-b border-white/5 bg-black/30 no-print">
        <div class="flex-1"><button onclick="window.scrollTo(0,0)" class="text-[10px] tracking-widest font-bold opacity-60 uppercase">Home</button></div>
        <div class="cursor-pointer" onclick="location.reload()"><img src="logo.jpg" alt="Magic Ruchi" class="h-16 md:h-24 object-contain"></div>
        <div class="flex-1 flex justify-end">
            <button id="adminBtn" onclick="toggleAdmin()" class="text-[10px] tracking-widest font-bold border border-yellow-600/30 px-6 py-2 rounded-full hover:bg-yellow-600 hover:text-black transition uppercase">Admin Portal</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12 flex flex-col lg:flex-row gap-12 no-print">
        <div class="flex-grow">
            <header class="text-center mb-12">
                <span class="gold-text italic text-sm tracking-[0.4em] block mb-2 uppercase opacity-80">Magic in Every Bite</span>
                <h1 class="text-4xl md:text-6xl gold-text mb-6">Authentic Kerala Kitchen</h1>
            </header>
            <div id="recipeGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <aside class="admin-section w-full lg:w-96">
            <div class="glass p-8 rounded-[40px] sticky top-28">
                <h2 id="formTitle" class="gold-text text-2xl italic mb-6 text-center">Creator Studio</h2>
                <form id="recipeForm" class="space-y-4">
                    <input type="hidden" id="editId">
                    <input type="text" id="title" required placeholder="Recipe Name" class="w-full bg-black/20 border border-white/10 rounded-2xl p-4 text-white outline-none">
                    <input type="text" id="titleML" required placeholder="പേര് (മലയാളം)" class="w-full bg-black/20 border border-white/10 rounded-2xl p-4 text-white outline-none">
                    <select id="cat" class="w-full bg-[#011a14] border border-white/10 rounded-2xl p-4 text-white">
                        <option value="Veg">Vegetarian</option>
                        <option value="Non-Veg">Meat & Seafood</option>
                    </select>
                    <div class="relative border-2 border-dashed border-white/10 rounded-2xl p-6 text-center hover:bg-white/5 transition-all">
                        <input type="file" id="imgInput" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" onchange="previewImg(event)">
                        <span id="uploadTxt" class="text-[10px] uppercase opacity-40">Upload Photo</span>
                        <img id="imgPreview" src="#" class="hidden w-full h-40 object-cover rounded-xl mt-2">
                    </div>
                    <textarea id="method" placeholder="Cooking Method..." required class="w-full bg-black/20 border border-white/10 rounded-2xl p-4 h-32 text-white outline-none"></textarea>
                    <button type="submit" id="submitBtn" class="w-full bg-yellow-600 text-black font-black py-4 rounded-2xl uppercase text-[10px]">Publish Magic</button>
                    <button type="button" id="cancelEdit" onclick="resetForm()" class="hidden w-full border border-white/20 text-white py-2 rounded-2xl text-[8px] uppercase mt-2">Cancel Edit</button>
                    <div class="flex gap-2 mt-4 pt-4 border-t border-white/5">
                        <button type="button" onclick="resetToDefaults()" class="flex-1 border border-red-500/30 text-red-500/60 hover:text-red-500 py-2 rounded-xl text-[8px] uppercase transition">Reset Defaults</button>
                    </div>
                </form>
            </div>
        </aside>
    </main>

    <div id="recipeDetail">
        <nav class="p-8 flex justify-between items-center no-print backdrop-blur-md bg-black/40 sticky top-0">
            <button onclick="closeRecipe()" class="gold-text font-black text-[10px] uppercase">✕ Back</button>
            <button onclick="window.print()" class="bg-yellow-600 text-black px-6 py-2 rounded-full font-black text-[10px] uppercase">Print PDF</button>
        </nav>
        <div class="max-w-4xl mx-auto p-6 md:py-16">
            <img id="detImg" src="" class="w-full h-[300px] md:h-[500px] object-cover rounded-[50px] mb-12 border border-white/10">
            <h1 id="detTitle" class="gold-text text-5xl md:text-7xl mb-4"></h1>
            <p id="detTitleML" class="text-2xl md:text-4xl opacity-30 italic mb-12"></p>
            <div class="glass p-10 rounded-[40px] leading-relaxed text-xl font-light text-white/90 whitespace-pre-wrap" id="detMethod"></div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "04742512896"; 

        // ADD PERMANENT RECIPES HERE
        const VEG_CLIPART = "https://cdn.jsdelivr.net/gh/twitter/twemoji@latest/assets/svg/1f96c.svg";
        const NONVEG_CLIPART = "https://cdn.jsdelivr.net/gh/twitter/twemoji@latest/assets/svg/1f357.svg";

        const globalRecipes = [
            {
                id: 101,
                title: "Kerala Fish Curry",
                titleML: "മീൻ കറി",
                cat: "Non-Veg",
                img: "https://images.unsplash.com/photo-1621460241682-136544521443?q=80&w=2070&auto=format&fit=crop",
                method: "1. Clean the fish.\n2. Sauté shallots and ginger.\n3. Add chili and Kudampuli.\n4. Simmer until thick."
            },
         {
                id: 102,
                title: "Kerala Chicken Curry",
                titleML: "കോഴി കറി",
                cat: "Non-Veg",
                img: "https://images.unsplash.com/photo-1603894584373-5ac82b2ae398?q=80&w=2070&auto=format&fit=crop",
                method: "1. Marinate chicken with turmeric, chili, salt.\n2. Sauté onions, ginger-garlic.\n3. Add spices and tomato; cook down.\n4. Add chicken and coconut milk; simmer till tender."
            },
            {
                id: 103,
                title: "Beef Ularthiyathu",
                titleML: "ബീഫ് ഉലർത്തിയത്",
                cat: "Non-Veg",
                img: "https://images.unsplash.com/photo-1601050690597-df0568f70950?q=80&w=2070&auto=format&fit=crop",
                method: "1. Pressure-cook beef with spices.\n2. Temper coconut oil with curry leaves.\n3. Add cooked beef and roast dry.\n4. Finish with fried coconut slivers."
            },
            {
                id: 104,
                title: "Prawn Roast",
                titleML: "ചെമ്മീൻ റോസ്റ്റ്",
                cat: "Non-Veg",
                img: "https://images.unsplash.com/photo-1567129937968-cdad8f0d5a3a?q=80&w=2070&auto=format&fit=crop",
                method: "1. Clean prawns; marinate with chili, turmeric.\n2. Sauté onion, green chili, ginger-garlic.\n3. Add prawns and roast on medium.\n4. Finish with pepper and curry leaves."
            },
            {
                id: 105,
                title: "Egg Roast",
                titleML: "മുട്ട റോസ്റ്റ്",
                cat: "Non-Veg",
                img: "https://images.unsplash.com/photo-1594179047519-f347310d3322?q=80&w=2070&auto=format&fit=crop",
                method: "1. Boil and peel eggs; slit.\n2. Caramelize onions with spices.\n3. Add tomato and reduce.\n4. Toss eggs in masala; simmer briefly."
            },
            {
                id: 106,
                title: "Avial",
                titleML: "അവിയൽ",
                cat: "Veg",
                img: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?q=80&w=2070&auto=format&fit=crop",
                method: "1. Cook mixed vegetables with turmeric and salt.\n2. Grind coconut, cumin, green chilies, curd.\n3. Mix into vegetables; warm gently.\n4. Temper coconut oil with curry leaves."
            },
            {
                id: 107,
                title: "Erissery",
                titleML: "എരിശ്ശേരി",
                cat: "Veg",
                img: "https://images.unsplash.com/photo-1606471191009-63994c53433b?q=80&w=2070&auto=format&fit=crop",
                method: "1. Cook pumpkin and beans till soft.\n2. Grind coconut, cumin, chilies; add.\n3. Simmer to thicken.\n4. Top with roasted coconut and mustard."
            },
            {
                id: 108,
                title: "Sambar",
                titleML: "സാംബാർ",
                cat: "Veg",
                img: "https://images.unsplash.com/photo-1589301760014-d929f3979dbc?q=80&w=2070&auto=format&fit=crop",
                method: "1. Pressure-cook dal till soft.\n2. Cook veggies with tamarind and sambar powder.\n3. Combine dal and veggies; simmer.\n4. Temper mustard, chili, curry leaves; pour over."
            },
            {
                id: 109,
                title: "Vegetable Stew",
                titleML: "സ്റ്റ്യൂ",
                cat: "Veg",
                img: "https://images.unsplash.com/photo-1547592166-23ac45744acd?q=80&w=2070&auto=format&fit=crop",
                method: "1. Sauté onions, ginger, green chilies in coconut oil.\n2. Add vegetables and thin coconut milk.\n3. Cook till tender.\n4. Finish with thick coconut milk; do not boil."
            },
            {
                id: 110,
                title: "Thalassery Biryani",
                titleML: "തളശ്ശേരി ബിരിയാണി",
                cat: "Non-Veg",
                img: "https://images.unsplash.com/photo-1563379091339-03b21bc4a4f8?q=80&w=2070&auto=format&fit=crop",
                method: "1. Marinate meat with spices and curd.\n2. Fry onions golden; make masala.\n3. Parboil Jeerakasala rice with whole spices.\n4. Layer and dum-cook till aromatic."
            }
        ];

        let recipes = [];

        function loadRecipes() {
            try {
                const saved = JSON.parse(localStorage.getItem('finalMagicDB'));
                if (!Array.isArray(saved) || saved.length === 0) {
                    recipes = [...globalRecipes];
                    save();
                } else {
                    const ids = new Set(saved.map(r => r.id));
                    const merged = saved.map(r => {
                        const globalMatch = globalRecipes.find(gr => gr.id === r.id);
                        // Migrate to new clipart if it was using old unsplash or icons8 links
                        if (globalMatch && (r.img.includes('unsplash.com') || r.img.includes('icons8.com'))) {
                            return { ...r, img: globalMatch.img };
                        }
                        return r;
                    });
                    globalRecipes.forEach(gr => { if (!ids.has(gr.id)) merged.push(gr); });
                    recipes = merged;
                }
            } catch (_) {
                recipes = [...globalRecipes];
                save();
            }
        }

        function save() { localStorage.setItem('finalMagicDB', JSON.stringify(recipes)); }

        function resetToDefaults() {
            if(confirm("Warning: This will delete ALL your custom recipes and reset to the official permanent list. Continue?")) {
                localStorage.removeItem('finalMagicDB');
                location.reload();
            }
        }

        function copyAsCode(id) {
            const r = recipes.find(rec => rec.id == id);
            const code = JSON.stringify({
                id: r.id,
                title: r.title,
                titleML: r.titleML,
                cat: r.cat,
                img: r.img,
                method: r.method
            }, null, 4);
            navigator.clipboard.writeText(code + ",").then(() => {
                alert("Code copied! You can now paste it into globalRecipes in index.html");
            });
        }

        function toggleAdmin() {
            if (document.body.classList.contains('admin-active')) {
                document.body.classList.remove('admin-active');
            } else {
                const pass = prompt("Password:");
                if (pass === ADMIN_PASSWORD) document.body.classList.add('admin-active');
                else alert("Wrong!");
            }
        }

        function previewImg(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (f) => {
                    document.getElementById('imgPreview').src = f.target.result;
                    document.getElementById('imgPreview').classList.remove('hidden');
                    document.getElementById('uploadTxt').classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        document.getElementById('recipeForm').onsubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const cat = document.getElementById('cat').value;
            const fallback = cat === 'Veg' ? VEG_CLIPART : NONVEG_CLIPART;
            const data = {
                title: document.getElementById('title').value,
                titleML: document.getElementById('titleML').value,
                cat: cat,
                method: document.getElementById('method').value,
                img: document.getElementById('imgPreview').src && !document.getElementById('imgPreview').src.includes('#') ? document.getElementById('imgPreview').src : fallback
            };

            if (id) {
                const index = recipes.findIndex(r => r.id == id);
                recipes[index] = { ...recipes[index], ...data };
            } else {
                const newRecipe = { id: Date.now(), ...data };
                recipes.push(newRecipe);
                console.log("New Recipe Code (to add to globalRecipes):", JSON.stringify(newRecipe, null, 4) + ",");
            }
            save(); render(); resetForm();
        };

        function render() {
            const grid = document.getElementById('recipeGrid');
            grid.innerHTML = '';
            recipes.forEach(r => {
                const card = document.createElement('div');
                card.className = "glass p-5 rounded-[40px] group cursor-pointer transition-all relative overflow-hidden";
                const fallback = r.cat === 'Veg' ? VEG_CLIPART : NONVEG_CLIPART;
                const isClipart = r.img.includes('twemoji') || r.img.includes('icons8');
                card.innerHTML = `
                    <div class="relative h-64 overflow-hidden rounded-[30px] mb-6 flex items-center justify-center ${isClipart ? 'bg-white/5 p-12' : ''}" onclick="viewRecipe(${r.id})">
                        <img src="${r.img}" onerror="this.src='${fallback}'" class="${isClipart ? 'w-32 h-32 object-contain' : 'w-full h-full object-cover'}">
                    </div>
                    <div class="flex justify-between items-start px-2">
                        <div onclick="viewRecipe(${r.id})">
                            <h3 class="gold-text text-xl font-bold">${r.title}</h3>
                            <p class="text-[9px] opacity-40 uppercase">${r.titleML}</p>
                        </div>
                        <div class="admin-controls hidden flex flex-col gap-2">
                            <button onclick="editRecipe(${r.id})" class="text-blue-400 text-[9px] font-bold uppercase hover:underline">Edit</button>
                            <button onclick="copyAsCode(${r.id})" class="text-green-400 text-[9px] font-bold uppercase hover:underline">Copy Code</button>
                            <button onclick="remove(${r.id})" class="text-red-500 text-[9px] font-bold uppercase hover:underline">${globalRecipes.some(gr => gr.id === r.id) ? 'Hide' : 'Delete'}</button>
                        </div>
                    </div>`;
                if (globalRecipes.some(gr => gr.id === r.id)) {
                    const badge = document.createElement('div');
                    badge.className = "absolute top-4 right-4 bg-yellow-600/80 text-black text-[8px] font-black px-3 py-1 rounded-full uppercase tracking-tighter backdrop-blur-sm z-10";
                    badge.innerText = "Permanent";
                    card.prepend(badge);
                }
                grid.prepend(card);
            });
        }

        function editRecipe(id) {
            const r = recipes.find(rec => rec.id == id);
            document.getElementById('editId').value = r.id;
            document.getElementById('title').value = r.title;
            document.getElementById('titleML').value = r.titleML;
            document.getElementById('cat').value = r.cat;
            document.getElementById('method').value = r.method;
            document.getElementById('imgPreview').src = r.img;
            document.getElementById('imgPreview').classList.remove('hidden');
            document.getElementById('uploadTxt').classList.add('hidden');
            document.getElementById('submitBtn').innerText = "Update Magic";
            document.getElementById('cancelEdit').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function resetForm() {
            document.getElementById('recipeForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('imgPreview').classList.add('hidden');
            document.getElementById('uploadTxt').classList.remove('hidden');
            document.getElementById('submitBtn').innerText = "Publish Magic";
            document.getElementById('cancelEdit').classList.add('hidden');
        }

        function remove(id) {
            const isPerm = globalRecipes.some(r => r.id === id);
            const msg = isPerm ? "This is a permanent recipe. Hiding it will remove it from view until you clear site data. Hide?" : "Delete this recipe permanently?";
            if(confirm(msg)) { recipes = recipes.filter(r => r.id !== id); save(); render(); }
        }

        function viewRecipe(id) {
            const r = recipes.find(rec => rec.id == id);
            const fallback = r.cat === 'Veg' ? VEG_CLIPART : NONVEG_CLIPART;
            const isClipart = r.img.includes('twemoji') || r.img.includes('icons8');
            
            document.getElementById('detTitle').innerText = r.title;
            document.getElementById('detTitleML').innerText = r.titleML;
            
            const detImg = document.getElementById('detImg');
            detImg.src = r.img;
            detImg.onerror = () => { detImg.src = fallback; };
            
            // Adjust detail image container for clipart
            const detImgContainer = detImg.parentElement;
            if (isClipart) {
                detImg.className = "w-48 h-48 object-contain mx-auto";
                detImgContainer.className = "max-w-4xl mx-auto p-6 md:py-16 flex flex-col items-center text-center";
            } else {
                detImg.className = "w-full h-[300px] md:h-[500px] object-cover rounded-[50px] mb-12 border border-white/10";
                detImgContainer.className = "max-w-4xl mx-auto p-6 md:py-16";
            }
            
            document.getElementById('detMethod').innerText = r.method;
            document.getElementById('recipeDetail').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeRecipe() { document.getElementById('recipeDetail').style.display = 'none'; document.body.style.overflow = 'auto'; }

        window.onload = () => { loadRecipes(); render(); };
    </script>
</body>
</html>
